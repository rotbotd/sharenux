name: Error Count Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-errors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build and capture errors
        run: |
          dotnet build ShareX.HelpersLib/ShareX.HelpersLib.csproj 2>&1 | grep "error CS" | sed "s|$(pwd)/||g" | sort > .error-current || true

      - name: Compare errors
        run: |
          
          current=$(wc -l < .error-current)
          baseline=$(wc -l < .error-baseline)
          
          echo "Current: $current errors"
          echo "Baseline: $baseline errors"
          
          if [ "$current" -gt "$baseline" ]; then
            echo ""
            echo "❌ Error count increased from $baseline to $current"
            echo ""
            echo "New errors:"
            comm -13 <(sort .error-baseline) <(sort .error-current) || true
            exit 1
          elif [ "$current" -lt "$baseline" ]; then
            echo ""
            echo "✅ Error count decreased from $baseline to $current (−$((baseline - current)))"
            echo ""
            echo "Fixed errors:"
            comm -23 <(sort .error-baseline) <(sort .error-current) || true
          else
            echo ""
            echo "➖ Error count unchanged at $current"
          fi

      - name: Update baseline on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cp .error-current .error-baseline
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .error-baseline
          git diff --cached --quiet || git commit -m "update error baseline: $(wc -l < .error-baseline) errors"
          git push
