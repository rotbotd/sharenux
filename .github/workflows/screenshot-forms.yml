name: Screenshot Forms

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: windows-latest
    steps:
      - name: Clone upstream ShareX
        run: git clone --depth 1 --branch v18.0.1 https://github.com/ShareX/ShareX.git sharex

      - name: Patch internal classes to public
        shell: pwsh
        run: |
          # Make internal forms public so we can screenshot them
          $files = @(
            "sharex/ShareX.ScreenCaptureLib/Forms/TextDrawingInputBox.cs",
            "sharex/ShareX.ScreenCaptureLib/Forms/TextDrawingInputBox.Designer.cs"
          )
          foreach ($file in $files) {
            if (Test-Path $file) {
              (Get-Content $file) -replace 'internal partial class', 'public partial class' | Set-Content $file
              Write-Host "Patched: $file"
            }
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Create screenshot tool
        shell: pwsh
        run: |
          $code = @'
          using System;
          using System.Collections.Generic;
          using System.Drawing;
          using System.Drawing.Imaging;
          using System.IO;
          using System.Linq;
          using System.Reflection;
          using System.Runtime.InteropServices;
          using System.Windows.Forms;
          using ShareX;
          using ShareX.HelpersLib;
          using ShareX.IndexerLib;
          using ShareX.MediaLib;
          using ShareX.ScreenCaptureLib;
          using ShareX.UploadersLib;
          using ShareX.HistoryLib;
          using ShareX.HistoryLib.Forms;
          using ShareX.ImageEffectsLib;

          class Program
          {
              [DllImport("user32.dll")]
              static extern bool PostMessage(IntPtr hWnd, uint Msg, IntPtr wParam, IntPtr lParam);
              const uint WM_CLOSE = 0x0010;

              [STAThread]
              static void Main()
              {
                  Application.EnableVisualStyles();
                  Application.SetCompatibleTextRenderingDefault(false);

                  Directory.CreateDirectory("screenshots");

                  // Create a test image for forms that need one
                  using var testBitmap = new Bitmap(400, 300);
                  using (var g = Graphics.FromImage(testBitmap))
                  {
                      g.Clear(Color.SteelBlue);
                      g.DrawString("Test Image", new Font("Arial", 24), Brushes.White, 100, 120);
                  }
                  var testImage = (Image)testBitmap.Clone();

                  // === ShareX.HelpersLib ===
                  Screenshot(new HashCheckerForm(), "HashCheckerForm");
                  Screenshot(new ClipboardViewerForm(), "ClipboardViewerForm");
                  Screenshot(new ColorPickerForm(Color.Red), "ColorPickerForm");
                  Screenshot(new GradientPickerForm(new GradientInfo()), "GradientPickerForm");
                  Screenshot(new ErrorForm("Test Error", "Stack trace here...", null, null, false), "ErrorForm");
                  Screenshot(new MyMessageBox("Test message", "Title", MessageBoxButtons.OK), "MyMessageBox");
                  Screenshot(new PrintTextForm("Sample text to print", new PrintSettings()), "PrintTextForm");

                  // === ShareX.MediaLib ===
                  Screenshot(new ImageSplitterForm(), "ImageSplitterForm");
                  Screenshot(new ImageThumbnailerForm(), "ImageThumbnailerForm");
                  Screenshot(new ImageCombinerForm(new ImageCombinerOptions()), "ImageCombinerForm");
                  Screenshot(new VideoConverterForm("ffmpeg.exe", new VideoConverterOptions()), "VideoConverterForm");
                  Screenshot(new VideoThumbnailerForm("ffmpeg.exe", new VideoThumbnailOptions()), "VideoThumbnailerForm");

                  // === ShareX.ScreenCaptureLib ===
                  Screenshot(new CanvasSizeForm(), "CanvasSizeForm");
                  Screenshot(new ImageInsertForm(), "ImageInsertForm");
                  Screenshot(new ImageSizeForm(new Size(800, 600), ImageInterpolationMode.NearestNeighbor), "ImageSizeForm");
                  Screenshot(new ScreenRecordForm(new Rectangle(0, 0, 800, 600)), "ScreenRecordForm");
                  Screenshot(new ScrollingCaptureRegionForm(new Rectangle(0, 0, 800, 600)), "ScrollingCaptureRegionForm");
                  Screenshot(new ScrollingCaptureOptionsForm(new ScrollingCaptureOptions()), "ScrollingCaptureOptionsForm");
                  Screenshot(new FFmpegOptionsForm(new ScreenRecordingOptions()), "FFmpegOptionsForm");
                  Screenshot(new EditorStartupForm(new RegionCaptureOptions()), "EditorStartupForm");
                  Screenshot(new NewImageForm(new RegionCaptureOptions()), "NewImageForm");
                  Screenshot(new StickerPackForm(new List<StickerPackInfo>()), "StickerPackForm");
                  Screenshot(new TextDrawingInputBox("Sample text", new TextDrawingOptions(), false, new ColorPickerOptions()), "TextDrawingInputBox");

                  // === ShareX.UploadersLib ===
                  Screenshot(new EmailForm(), "EmailForm");
                  Screenshot(new JiraUpload(), "JiraUpload");
                  Screenshot(new PuushLoginForm(), "PuushLoginForm");
                  Screenshot(new CustomUploaderSyntaxTestForm(), "CustomUploaderSyntaxTestForm");
                  Screenshot(new UserPassBox("Login", "", ""), "UserPassBox");
                  Screenshot(new YouTubeVideoOptionsForm(), "YouTubeVideoOptionsForm");
                  Screenshot(new TextUploadForm("Sample text content"), "TextUploadForm");
                  Screenshot(new ParserSelectForm(new[] { "Option 1", "Option 2", "Option 3" }), "ParserSelectForm");

                  // === ShareX.IndexerLib ===
                  // Screenshot(new DirectoryIndexerForm(new IndexerSettings()), "DirectoryIndexerForm"); // HANGS

                  // === ShareX (main app) - use lambdas to catch constructor exceptions ===
                  // Screenshot(() => new AboutForm(), "AboutForm"); // HANGS
                  Screenshot(() => new ActionsForm(), "ActionsForm");
                  Screenshot(() => new ApplicationSettingsForm(), "ApplicationSettingsForm");
                  Screenshot(() => new ClipboardFormatForm(), "ClipboardFormatForm");
                  Screenshot(() => new FirstTimeConfigForm(), "FirstTimeConfigForm");
                  // Screenshot(() => new FirstTimeUploadForm(), "FirstTimeUploadForm"); // HANGS
                  // Screenshot(() => new InspectWindowForm(), "InspectWindowForm"); // HANGS
                  Screenshot(() => new QRCodeForm("https://example.com"), "QRCodeForm");
                  Screenshot(() => new QuickTaskMenuEditorForm(), "QuickTaskMenuEditorForm");
                  Screenshot(() => new WatchFolderForm(), "WatchFolderForm");
                  Screenshot(() => new FileExistForm("C:\\test\\example.png"), "FileExistForm");
                  Screenshot(() => new MainForm(), "MainForm");

                  // === Forms that need a Bitmap/Image ===
                  Screenshot(new PrintForm(testImage, new PrintSettings()), "PrintForm");
                  Screenshot(new ImageBeautifierForm((Bitmap)testBitmap.Clone()), "ImageBeautifierForm");
                  Screenshot(new RegionCaptureLightForm((Bitmap)testBitmap.Clone()), "RegionCaptureLightForm");
                  Screenshot(new RegionCaptureTransparentForm(), "RegionCaptureTransparentForm");

                  // === ShareX.HistoryLib ===
                  Screenshot(new HistorySettingsForm(new HistorySettings()), "HistorySettingsForm");
                  Screenshot(new ImageHistorySettingsForm(new ImageHistorySettings()), "ImageHistorySettingsForm");
                  Screenshot(new HistoryItemEditForm(new HistoryItem()), "HistoryItemEditForm");

                  // === ShareX.ImageEffectsLib ===
                  Screenshot(new ImageEffectsForm((Bitmap)testBitmap.Clone(), new List<ImageEffectPreset> { ImageEffectPreset.GetDefaultPreset() }, 0), "ImageEffectsForm");

                  // === More ShareX forms ===
                  Screenshot(new QuickTaskInfoEditForm(new QuickTaskInfo()), "QuickTaskInfoEditForm");
                  Screenshot(new ActionsToolbarEditForm(new List<HotkeyType>()), "ActionsToolbarEditForm");
                  Screenshot(new StickerForm(new List<StickerPackInfo> { new StickerPackInfo() { Name = "Test" } }, 0), "StickerForm");
                  Screenshot(new CustomUploaderSettingsForm(new UploadersConfig()), "CustomUploaderSettingsForm");

                  // === Phase 1: Easy additions (use lambdas) ===
                  Screenshot(() => new TrayForm(), "TrayForm");
                  Screenshot(() => new ImageEffectPackagerForm("{}", "TestEffect", "C:\\Effects"), "ImageEffectPackagerForm");
                  // Screenshot(() => new RegionCaptureForm(RegionCaptureMode.Default, new RegionCaptureOptions(), (Bitmap)testBitmap.Clone()), "RegionCaptureForm"); // HANGS
                  Screenshot(() => new TaskSettingsForm(new TaskSettings(), true), "TaskSettingsForm");
                  Screenshot(() => new ClipboardUploadForm(new TaskSettings(), false), "ClipboardUploadForm");
                  Screenshot(() => new AfterCaptureForm(new TaskMetadata((Bitmap)testBitmap.Clone()), new TaskSettings()), "AfterCaptureForm");

                  // TaskInfo forms
                  var taskSettings = new TaskSettings();
                  var taskInfo = new TaskInfo(taskSettings);
                  taskInfo.FilePath = "C:\\test\\screenshot.png";
                  Screenshot(() => new AfterUploadForm(taskInfo), "AfterUploadForm");
                  Screenshot(() => new BeforeUploadForm(taskInfo), "BeforeUploadForm");

                  // === Phase 2: History forms with temp SQLite ===
                  var tempDbPath = Path.Combine(Path.GetTempPath(), "test_history.db");
                  using (var historyManager = new HistoryManagerSQLite(tempDbPath))
                  {
                      Screenshot(() => new HistoryForm(historyManager, new HistorySettings()), "HistoryForm");
                      Screenshot(() => new ImageHistoryForm(historyManager, new ImageHistorySettings()), "ImageHistoryForm");
                      Screenshot(() => new HistoryImportForm(historyManager, new List<HistoryItem>()), "HistoryImportForm");
                  }
                  try { File.Delete(tempDbPath); } catch { }

                  // === Phase 3: Reflection for private constructors ===
                  ScreenshotPrivate<InputBox>("InputBox", new[] { typeof(string), typeof(string), typeof(string), typeof(string) }, 
                      new object[] { "Enter Value", "", null, null });
                  ScreenshotPrivate<OutputBox>("OutputBox", new[] { typeof(string), typeof(string), typeof(bool) },
                      new object[] { "Output content here", "Output", false });
                  ScreenshotPrivate<ImageViewer>("ImageViewer", new[] { typeof(Image) },
                      new object[] { testImage });
                  ScreenshotPrivate<ResponseForm>("ResponseForm", new[] { typeof(UploadResult) },
                      new object[] { new UploadResult() });
                  // ScreenshotPrivate<ScrollingCaptureForm>("ScrollingCaptureForm", new[] { typeof(ScrollingCaptureOptions) },
                  //     new object[] { new ScrollingCaptureOptions() }); // HANGS
                  ScreenshotPrivate<UploadersConfigForm>("UploadersConfigForm", new[] { typeof(UploadersConfig) },
                      new object[] { new UploadersConfig() });
              }

              static void ScreenshotPrivate<T>(string name, Type[] paramTypes, object[] args) where T : Form
              {
                  try
                  {
                      var ctor = typeof(T).GetConstructor(
                          BindingFlags.NonPublic | BindingFlags.Instance, null, paramTypes, null);
                      if (ctor == null)
                      {
                          Console.WriteLine($"Failed {name}: No matching constructor found");
                          return;
                      }
                      var form = (Form)ctor.Invoke(args);
                      Screenshot(form, name);
                  }
                  catch (Exception ex)
                  {
                      Console.WriteLine($"Failed {name}: {ex.Message}");
                  }
              }

              // Overload that takes an already-created form (catches exceptions during show/capture)
              static void Screenshot(Form form, string name)
              {
                  Console.WriteLine($"Starting: {name}");
                  Console.Out.Flush();

                  var done = false;
                  IntPtr handle = IntPtr.Zero;
                  
                  form.HandleCreated += (s, e) => handle = form.Handle;
                  
                  // Background thread to kill form after timeout using Win32 PostMessage
                  var killer = new System.Threading.Thread(() =>
                  {
                      System.Threading.Thread.Sleep(10000);
                      if (!done)
                      {
                          Console.WriteLine($"TIMEOUT: {name} (killing via PostMessage, handle={handle})");
                          Console.Out.Flush();
                          if (handle != IntPtr.Zero)
                              PostMessage(handle, WM_CLOSE, IntPtr.Zero, IntPtr.Zero);
                      }
                  });
                  killer.IsBackground = true;
                  killer.Start();

                  try
                  {
                      form.StartPosition = FormStartPosition.Manual;
                      form.Location = new Point(0, 0);
                      form.Show();
                      form.Refresh();
                      Application.DoEvents();

                      using (var bmp = new Bitmap(form.Width, form.Height))
                      {
                          form.DrawToBitmap(bmp, new Rectangle(0, 0, form.Width, form.Height));
                          bmp.Save($"screenshots/{name}.png", ImageFormat.Png);
                          Console.WriteLine($"Saved: {name}.png");
                      }

                      done = true;
                      form.Close();
                      form.Dispose();
                  }
                  catch (Exception ex)
                  {
                      done = true;
                      Console.WriteLine($"Failed {name}: {ex.Message}");
                      try { form?.Dispose(); } catch { }
                  }
              }

              // Overload with factory function - catches exceptions during construction too
              static void Screenshot(Func<Form> createForm, string name)
              {
                  try
                  {
                      var form = createForm();
                      Screenshot(form, name);
                  }
                  catch (Exception ex)
                  {
                      Console.WriteLine($"Starting: {name}");
                      Console.WriteLine($"Failed {name}: {ex.Message}");
                  }
              }
          }
          '@
          New-Item -ItemType Directory -Force -Path "sharex/ScreenshotTool"
          $code | Out-File -Encoding UTF8 "sharex/ScreenshotTool/Program.cs"

          $csproj = @'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>WinExe</OutputType>
              <TargetFramework>net9.0-windows10.0.22621.0</TargetFramework>
              <UseWindowsForms>true</UseWindowsForms>
              <ImplicitUsings>enable</ImplicitUsings>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="..\ShareX\ShareX.csproj" />
              <ProjectReference Include="..\ShareX.HelpersLib\ShareX.HelpersLib.csproj" />
              <ProjectReference Include="..\ShareX.HistoryLib\ShareX.HistoryLib.csproj" />
              <ProjectReference Include="..\ShareX.IndexerLib\ShareX.IndexerLib.csproj" />
              <ProjectReference Include="..\ShareX.MediaLib\ShareX.MediaLib.csproj" />
              <ProjectReference Include="..\ShareX.ScreenCaptureLib\ShareX.ScreenCaptureLib.csproj" />
              <ProjectReference Include="..\ShareX.UploadersLib\ShareX.UploadersLib.csproj" />
              <ProjectReference Include="..\ShareX.ImageEffectsLib\ShareX.ImageEffectsLib.csproj" />
            </ItemGroup>
          </Project>
          '@
          $csproj | Out-File -Encoding UTF8 "sharex/ScreenshotTool/ScreenshotTool.csproj"

      - name: Build and run screenshot tool
        run: |
          cd sharex
          dotnet run --project ScreenshotTool/ScreenshotTool.csproj -c Release

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: form-screenshots
          path: sharex/screenshots/

      - name: Checkout sharenux repo
        uses: actions/checkout@v4
        with:
          path: sharenux

      - name: Commit screenshots
        shell: pwsh
        run: |
          cd sharenux
          if (-not (Test-Path "screenshots/ShareX")) { New-Item -ItemType Directory -Force -Path "screenshots/ShareX" }
          Copy-Item ../sharex/screenshots/*.png screenshots/ShareX/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/ShareX
          git commit -m "update ShareX form screenshots" 2>$null
          if ($LASTEXITCODE -eq 0) { git push } else { Write-Host "No changes to commit" }
