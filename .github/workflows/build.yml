name: Build ShareX

on:
  push:
    branches:
      - "**"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "**/*.md"
      - "**/*.gitignore"
      - "**/*.gitattributes"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Release
          - Debug
          - Steam
          - MicrosoftStore
          - MicrosoftStoreDebug
        platform:
          - x64
          - ARM64
        exclude:
          # Steam configuration doesn't support ARM64
          - configuration: Steam
            platform: ARM64

    env:
      SOLUTION_FILE_PATH: ShareX.sln
      ASSEMBLY_INFO_PATH: Directory.build.props

    outputs:
      APP_VERSION: ${{ env.APP_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Set PLATFORM & RUNTIME_ID
        run: |
          $platform = if ("${{ matrix.platform }}" -eq "ARM64") { "arm64" } else { "x64" }
          echo "PLATFORM=$platform" >> $env:GITHUB_ENV
          echo "RUNTIME_ID=win-$platform" >> $env:GITHUB_ENV

      - name: Set APP_VERSION
        run: |
          $content = Get-Content "${{ env.ASSEMBLY_INFO_PATH }}" -Raw
          $pattern = '<Version>([0-9]+(?:\.[0-9]+){1,3})</Version>'
          $match = [regex]::Match($content, $pattern)
          $version = $match.Groups[1].Value
          if ($env:GITHUB_REF -eq "refs/heads/develop") {
            $version = "$version.$env:GITHUB_RUN_NUMBER"
            $content = [regex]::Replace($content, $pattern, "<Version>$version</Version>")
            Set-Content -Path "${{ env.ASSEMBLY_INFO_PATH }}" -Value "$content" -NoNewline
          }
          echo $version
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Download API keys
        env:
          API_KEYS: ${{ secrets.API_KEYS }}
        if: env.API_KEYS != ''
        working-directory: ${{ env.GITHUB_WORKSPACE }}
        run: |
          Invoke-WebRequest -Uri "$env:API_KEYS" -OutFile "ShareX.UploadersLib\APIKeys\APIKeysLocal.cs"

      - name: Restore NuGet packages
        run: dotnet restore --runtime "${{ env.RUNTIME_ID }}" "${{ env.SOLUTION_FILE_PATH }}"

      - name: Build
        run: dotnet build --no-restore --configuration "${{ matrix.configuration }}" -p:Platform="${{ matrix.platform }}" --self-contained true /m:1 "${{ env.SOLUTION_FILE_PATH }}"

      - name: Setup
        working-directory: ${{ env.GITHUB_WORKSPACE }}
        run: .\ShareX.Setup\ShareX-Setup.ps1 -Job "${{ matrix.configuration }}" -Platform "${{ env.PLATFORM }}" -Silent

      - name: Upload artifact (Setup-x64)
        if: matrix.configuration == 'Release' && matrix.platform == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: Setup-x64
          path: Output\ShareX-${{ env.APP_VERSION }}-setup-${{ env.PLATFORM }}.exe

      - name: Upload artifact (Setup-ARM64)
        if: matrix.configuration == 'Release' && matrix.platform == 'ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: Setup-ARM64
          path: Output\ShareX-${{ env.APP_VERSION }}-setup-${{ env.PLATFORM }}.exe

      - name: Upload artifact (Portable-x64)
        if: matrix.configuration == 'Release' && matrix.platform == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: Portable-x64
          path: Output\ShareX-${{ env.APP_VERSION }}-portable-${{ env.PLATFORM }}.zip

      - name: Upload artifact (Portable-ARM64)
        if: matrix.configuration == 'Release' && matrix.platform == 'ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: Portable-ARM64
          path: Output\ShareX-${{ env.APP_VERSION }}-portable-${{ env.PLATFORM }}.zip

      - name: Upload artifact (Debug-x64)
        if: matrix.configuration == 'Debug' && matrix.platform == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: Debug-x64
          path: Output\ShareX-${{ env.APP_VERSION }}-debug-${{ env.PLATFORM }}.zip

      - name: Upload artifact (Debug-ARM64)
        if: matrix.configuration == 'Debug' && matrix.platform == 'ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: Debug-ARM64
          path: Output\ShareX-${{ env.APP_VERSION }}-debug-${{ env.PLATFORM }}.zip

      - name: Upload artifact (Steam-x64)
        if: matrix.configuration == 'Steam' && matrix.platform == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: Steam-x64
          path: Output\ShareX-${{ env.APP_VERSION }}-Steam-${{ env.PLATFORM }}.zip

      - name: Upload artifact (Steam-ARM64)
        if: matrix.configuration == 'Steam' && matrix.platform == 'ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: Steam-ARM64
          path: Output\ShareX-${{ env.APP_VERSION }}-Steam-${{ env.PLATFORM }}.zip

      - name: Upload artifact (MicrosoftStore-x64)
        if: matrix.configuration == 'MicrosoftStore' && matrix.platform == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: MicrosoftStore-x64
          path: Output\ShareX-${{ env.APP_VERSION }}-MicrosoftStore-${{ env.PLATFORM }}.appx

      - name: Upload artifact (MicrosoftStore-ARM64)
        if: matrix.configuration == 'MicrosoftStore' && matrix.platform == 'ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: MicrosoftStore-ARM64
          path: Output\ShareX-${{ env.APP_VERSION }}-MicrosoftStore-${{ env.PLATFORM }}.appx

      - name: Upload artifact (MicrosoftStoreDebug-x64)
        if: matrix.configuration == 'MicrosoftStoreDebug' && matrix.platform == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: MicrosoftStoreDebug-x64
          path: Output\ShareX-${{ env.APP_VERSION }}-MicrosoftStore-debug-${{ env.PLATFORM }}.appx

      - name: Upload artifact (MicrosoftStoreDebug-ARM64)
        if: matrix.configuration == 'MicrosoftStoreDebug' && matrix.platform == 'ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: MicrosoftStoreDebug-ARM64
          path: Output\ShareX-${{ env.APP_VERSION }}-MicrosoftStore-debug-${{ env.PLATFORM }}.appx

  release:
    name: Release
    needs: build
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      REPO_DEV_BUILDS: ${{ github.repository_owner }}/DevBuilds
      RELEASE_BODY_PATH: RELEASE_BODY.md
      APP_VERSION: ${{ needs.build.outputs.APP_VERSION }}

    steps:
      - name: Download artifact (Setup-x64)
        uses: actions/download-artifact@v4
        with:
          name: Setup-x64
          path: Output

      - name: Download artifact (Setup-ARM64)
        uses: actions/download-artifact@v4
        with:
          name: Setup-ARM64
          path: Output

      - name: Download artifact (Portable-x64)
        uses: actions/download-artifact@v4
        with:
          name: Portable-x64
          path: Output

      - name: Download artifact (Portable-ARM64)
        if: github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v4
        with:
          name: Portable-ARM64
          path: Output

      - name: Download artifact (Debug-x64)
        if: github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v4
        with:
          name: Debug-x64
          path: Output

      - name: Download artifact (Debug-ARM64)
        if: github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v4
        with:
          name: Debug-ARM64
          path: Output

      - name: Download artifact (Steam-x64)
        if: github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v4
        with:
          name: Steam-x64
          path: Output

      # - name: Download artifact (Steam-ARM64)
      #   if: github.ref == 'refs/heads/develop'
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: Steam-ARM64
      #     path: Output

      - name: Download artifact (MicrosoftStore-x64)
        if: github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v4
        with:
          name: MicrosoftStore-x64
          path: Output

      - name: Download artifact (MicrosoftStore-ARM64)
        if: github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v4
        with:
          name: MicrosoftStore-ARM64
          path: Output

      - name: Download artifact (MicrosoftStoreDebug-x64)
        if: github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v4
        with:
          name: MicrosoftStoreDebug-x64
          path: Output

      - name: Download artifact (MicrosoftStoreDebug-ARM64)
        if: github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v4
        with:
          name: MicrosoftStoreDebug-ARM64
          path: Output

      - name: Create release body file
        run: |
          $checksums = Get-ChildItem -Path "Output\" -Recurse -File
            | Sort-Object -Property Name
            | ForEach-Object { "| $($_.Name) | ``$((Get-FileHash $_.FullName -Algorithm SHA256).Hash)`` |" }
            | Out-String
          $output = "| File | SHA256 |`r`n| --- | --- |`r`n$($checksums.Trim())"
          echo $output >> $env:GITHUB_STEP_SUMMARY
          if ($env:GITHUB_REF.StartsWith("refs/tags/v")) {
            $output = "**Changelog:** https://getsharex.com/changelog#$env:GITHUB_REF_NAME`r`n`r`n$output"
          }
          echo $output
          Set-Content -Path "${{ env.RELEASE_BODY_PATH }}" -Value "$output" -NoNewline

      - name: Release (Dev)
        env:
          CUSTOM_GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
        if: env.CUSTOM_GITHUB_TOKEN != '' && env.REPO_DEV_BUILDS != '' && github.ref == 'refs/heads/develop'
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.REPO_DEV_BUILDS }}
          token: ${{ env.CUSTOM_GITHUB_TOKEN }}
          tag_name: v${{ env.APP_VERSION }}
          name: ShareX ${{ env.APP_VERSION }} Dev
          body_path: ${{ env.RELEASE_BODY_PATH }}
          draft: false
          prerelease: false
          files: |
            Output/ShareX-${{ env.APP_VERSION }}-setup-x64.exe
            # Output/ShareX-${{ env.APP_VERSION }}-setup-arm64.exe
            Output/ShareX-${{ env.APP_VERSION }}-portable-x64.zip
            # Output/ShareX-${{ env.APP_VERSION }}-portable-arm64.zip
            Output/ShareX-${{ env.APP_VERSION }}-debug-x64.zip
            Output/ShareX-${{ env.APP_VERSION }}-debug-arm64.zip
            Output/ShareX-${{ env.APP_VERSION }}-Steam-x64.zip
            # Output/ShareX-${{ env.APP_VERSION }}-Steam-arm64.zip
            Output/ShareX-${{ env.APP_VERSION }}-MicrosoftStore-x64.appx
            Output/ShareX-${{ env.APP_VERSION }}-MicrosoftStore-arm64.appx
            Output/ShareX-${{ env.APP_VERSION }}-MicrosoftStore-debug-x64.appx
            Output/ShareX-${{ env.APP_VERSION }}-MicrosoftStore-debug-arm64.appx

      - name: Release (Stable)
        env:
          CUSTOM_GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
        if: env.CUSTOM_GITHUB_TOKEN != '' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.repository }}
          token: ${{ env.CUSTOM_GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ShareX ${{ env.APP_VERSION }}
          body_path: ${{ env.RELEASE_BODY_PATH }}
          draft: false
          prerelease: true
          files: |
            Output/ShareX-${{ env.APP_VERSION }}-setup-x64.exe
            # Output/ShareX-${{ env.APP_VERSION }}-setup-arm64.exe
            Output/ShareX-${{ env.APP_VERSION }}-portable-x64.zip
            # Output/ShareX-${{ env.APP_VERSION }}-portable-arm64.zip